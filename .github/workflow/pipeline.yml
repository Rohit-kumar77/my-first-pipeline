name: My First CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get the code
        uses: actions/checkout@v3

      - name: 🧪 Run tests
        run: ./test.sh

      - name: ✅ Done
        run: echo "Pipeline completed successfully!"
        